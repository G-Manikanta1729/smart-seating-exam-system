services:
  - type: web
    name: smart-seating-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MYSQL_URL
        sync: false
      - key: JWT_SECRET
        sync: false
